<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Under Construction | abulava</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100vh;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;

        display: grid;
        place-items: center;

        background: linear-gradient(-45deg, #234e70, #3b7ba8, #4b3061, #6a5acd);
        background-size: 400% 400%;
        animation: gradient 15s ease infinite;

        color: white;
        text-align: center;
        overflow: hidden;
      }

      @keyframes gradient {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      .container {
        width: 100%;
        max-width: 600px;
        padding: 3rem;
        background: rgba(0, 0, 0, 0.3);
        border-radius: 20px;
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        margin: auto;
      }

      h1 {
        font-size: 3rem;
        margin: 0 0 1rem 0;
      }

      p {
        font-size: 1.2rem;
        margin: 0.5rem 0;
      }

      .links {
        margin-top: 2rem;
        display: block;
      }

      .links a {
        display: inline-block;
        color: white;
        text-decoration: none;
        margin: 10px;
        padding: 10px 25px;
        border: 1px solid rgba(255, 255, 255, 0.4);
        border-radius: 25px;
        transition: all 0.3s ease;
      }

      .links a:hover {
        background: white;
        color: #234e70;
      }

      .fade-in {
        animation: fadeIn 1.5s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="container fade-in">
      <h1>Coming Soon</h1>
      <p>Hi! I'm <strong>Andrey Bulava</strong>.</p>
      <p>
        My opinionated collection of modern tools for dev work is coming soon <span style="opacity: 0.67;">(or
        eventually, no promises on the ETA)</span>.
      </p>

      <div class="links">
        <a href="https://github.com/abulava">GitHub</a>
        <a href="https://www.linkedin.com/in/andrii-bulava">LinkedIn</a>
      </div>
    </div>
  </body>
</html>
